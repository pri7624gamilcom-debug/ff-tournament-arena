<!DOCTYPE html>  
<html>  
<head>  
<title>Admin Panel</title>  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
</head>  
<body>  
<center>  
  <h1>ADMIN PANEL</h1>  
  <hr>  
  <h2>Total Profit Pool (Collected Coins)</h2>  
  <h1 id="poolCoins">0</h1>  
  <button onclick="withdrawProfit()" style="padding:10px 20px; background-color: green; color: white; border: none; cursor: pointer;">Withdraw All Profit</button>
  <hr>  
  
  <h2>Create New Tournament Room</h2>  
  <input type="text" id="roomName" placeholder="Enter Room Name">  
  <br><br>  
  <input type="text" id="roomId" placeholder="Enter Room ID (Optional)">  
  <br><br>  
  <input type="text" id="roomPassword" placeholder="Enter Room Password (Optional)">  
  <br><br>  
  <input type="number" id="entryFee" placeholder="Entry Fee Coins">  
  <br><br>  
  <label for="startTime"><b>Match Start Time:</b></label><br>  
  <input type="datetime-local" id="startTime">  
  <br><br>  
  <button onclick="createRoomRequest()">Create Room</button>  
  
  <hr>
  <h2>Manage Rooms</h2>
  <div id="roomData">
    Loading Rooms...
  </div>
  <hr>  
  
  <h2>Add Coins</h2>  
  <input type="text" id="userUid" placeholder="User UID">  
  <br><br>
  <input type="number" id="coinAmount" placeholder="Coins">  
  <br><br>
  <button onclick="addCoinsRequest()">Add Coins</button>  
  <hr>  
  
  <h2>Registrations</h2>  
  <div id="registrationData">Loading...</div>  
  <hr>  
  
  <h2>Deposit Requests</h2>  
  <div id="depositData">Loading...</div>  
  <hr>  
  
  <h2>Withdrawal Requests</h2>  
  <div id="withdrawData">Loading...</div>  
  <br>  
  <button onclick="logout()">Logout</button>  
</center>  

<script type="module">  
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";  
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";  
import {  
  getFirestore,  
  collection,  
  getDocs,  
  doc,  
  getDoc,  
  addDoc,  
  updateDoc,  
  deleteDoc  
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";  
  
const firebaseConfig = {  
  apiKey: "AIzaSyDXB_JNlV4lK-St7dndGMLKaTP_yx67eKM",  
  authDomain: "ff-tournament-app-aa2e3.firebaseapp.com",  
  projectId: "ff-tournament-app-aa2e3",  
  storageBucket: "ff-tournament-app-aa2e3.firebasestorage.app",  
  messagingSenderId: "247807878735",  
  appId: "1:247807878735:web:f4fa407b563f3ed108ec3a"  
};  
  
const app = initializeApp(firebaseConfig);  
const db = getFirestore(app);  
const auth = getAuth(app);   
  
onAuthStateChanged(auth, async (user) => {  
  if (!user) {  
    location.href = "admin-login.html";  
    return;  
  }  
  
  loadPool();  
  loadRegistrations();  
  loadDeposits();  
  loadWithdraws();  
  loadRooms(); 
});  

// NAYA FUNCTION: PROFIT WITHDRAWAL
window.withdrawProfit = async function() {
    let currentPool = Number(document.getElementById("poolCoins").innerText);
    if (currentPool <= 0) { alert("Koi profit available nahi hai!"); return; }

    if(confirm("Kya aapne profit apne bank mein transfer kar liya hai? Yeh coins reset ho jayenge.")) {
        const poolRef = doc(db, "system", "prizePool");
        await updateDoc(poolRef, { coins: 0 });
        alert("Profit withdrawal record ho gaya aur pool reset ho gaya.");
        loadPool();
    }
}
  
window.createRoomRequest = async function(){  
  let roomName = document.getElementById("roomName").value;  
  let roomId = document.getElementById("roomId").value;  
  let password = document.getElementById("roomPassword").value;  
  let entryFee = Number(document.getElementById("entryFee").value);  
  let startTimeVal = document.getElementById("startTime").value;  
  
  if(roomName == "" || startTimeVal == ""){  
    alert("Room Name aur Start Time zaroori hai!");  
    return;  
  }  
  if(entryFee <= 0){  
    alert("Enter Valid Entry Fee");  
    return;  
  }  
  
  try {  
    await addDoc(collection(db,"rooms"), {  
      roomName: roomName,  
      roomId: roomId || "",  
      password: password || "",  
      entryFee: entryFee,  
      startTime: startTimeVal  
    });  
  
    alert("Room Created Successfully!");  
    document.getElementById("roomName").value = "";  
    document.getElementById("roomId").value = "";  
    document.getElementById("roomPassword").value = "";  
    document.getElementById("entryFee").value = "";  
    document.getElementById("startTime").value = "";  
    loadRooms(); 
  } catch(error) {  
    alert(error.message);  
  }  
}  

async function loadRooms(){
  const box = document.getElementById("roomData");
  box.innerHTML = "Loading Rooms...";
  try {
    const snap = await getDocs(collection(db, "rooms"));
    box.innerHTML = "";
    if(snap.empty){ box.innerHTML = "<p>No Active Rooms Available</p>"; return; }
    snap.forEach((d) => {
      const room = d.data();
      box.innerHTML += `
        <div style="border: 1px dashed #666; padding: 10px; margin: 10px 0; max-width: 320px; text-align: left;">
          <h3>${room.roomName}</h3>
          <p>Fee: ${room.entryFee} Coins | Time: ${room.startTime || "Not Set"}</p>
          <input type="text" id="roomid-${d.id}" placeholder="Room ID" value="${room.roomId || ''}">
          <br><br>
          <input type="text" id="pass-${d.id}" placeholder="Room Password" value="${room.password || ''}">
          <br><br>
          <button onclick="updateRoom('${d.id}')">Update</button>
          <button onclick="deleteRoom('${d.id}')" style="color:red; margin-left:10px;">Delete</button>
        </div>
      `;
    });
  } catch (error) { console.error(error); }
}

window.updateRoom = async function(id){
  let roomId = document.getElementById("roomid-" + id).value;
  let password = document.getElementById("pass-" + id).value;
  try {
    await updateDoc(doc(db,"rooms",id), { roomId: roomId, password: password });
    alert("Room Updated");
    loadRooms();
  } catch (error) { alert("Update failed: " + error.message); }
}

window.deleteRoom = async function(id){
  if(!confirm("Delete Room?")){ return; }
  try {
    await deleteDoc(doc(db,"rooms",id));
    alert("Room Deleted");
    loadRooms();
  } catch (error) { alert("Delete failed: " + error.message); }
}
  
window.addCoinsRequest = async function(){  
  let uid = document.getElementById("userUid").value;  
  let coins = Number(document.getElementById("coinAmount").value);  
  if(uid==""){ alert("Enter User UID"); return; }  
  if(coins<=0){ alert("Enter Valid Coins"); return; }  
  const userRef = doc(db,"users",uid);  
  const userSnap = await getDoc(userRef);  
  if(!userSnap.exists()){ alert("User Not Found"); return; }  
  let currentCoins = Number(userSnap.data().coins || 0);  
  await updateDoc(userRef, { coins: currentCoins + coins });  
  alert(coins + " Coins Added Successfully");  
  document.getElementById("userUid").value="";  
  document.getElementById("coinAmount").value="";  
}  
  
async function loadPool(){  
  const poolRef = doc(db,"system","prizePool");  
  const poolSnap = await getDoc(poolRef);  
  if(poolSnap.exists()){  
    document.getElementById("poolCoins").innerHTML = poolSnap.data().coins || 0;  
  }  
}  
  
async function loadRegistrations(){  
  const box = document.getElementById("registrationData");  
  const snap = await getDocs(collection(db,"registrations"));  
  box.innerHTML="";  
  if(snap.empty){ box.innerHTML="<p>No Registrations</p>"; return; }  
  snap.forEach((d)=>{  
    const r = d.data();  
    box.innerHTML += `  
      <hr>  
      <h3>${r.playerName || "Unknown"}</h3>  
      <p>Room : ${r.roomName || ""}</p>  
      <p>User UID : ${r.userId || ""}</p>  
      <p>Game UID : ${r.gameUid || ""}</p>  
      <p>Entry Fee Coins : ${r.entryFee || 0}</p>  
      <p>Status : ${r.status || ""}</p>  
      <button onclick="approveRegistration('${d.id}')">Approve</button>  
      <button onclick="rejectRegistration('${d.id}')">Reject</button>  
      <button onclick="deleteRegistration('${d.id}')">Delete</button>  
    `;  
  });  
}  
  
async function loadDeposits(){  
  const box = document.getElementById("depositData");  
  const snap = await getDocs(collection(db,"depositRequests"));  
  box.innerHTML="";  
  if(snap.empty){ box.innerHTML="<p>No Deposit Requests</p>"; return; }  
  snap.forEach((d)=>{  
    const p = d.data();  
    box.innerHTML += `  
      <hr>  
      <h3>${p.playerName || "Unknown"}</h3>  
      <p>User ID : ${p.userId || ""}</p>  
      <p>Amount : ${p.amount || 0}</p>  
      <p>UTR : ${p.utr || ""}</p>  
      <p>Status : ${p.status || ""}</p>  
      <button onclick="approveDeposit('${d.id}')">Approve</button>  
      <button onclick="rejectDeposit('${d.id}')">Reject</button>  
      <button onclick="deleteDeposit('${d.id}')">Delete</button>  
    `;  
  });  
}  
  
async function loadWithdraws(){  
  const box = document.getElementById("withdrawData");  
  const snap = await getDocs(collection(db,"withdrawRequests"));  
  box.innerHTML="";  
  if(snap.empty){ box.innerHTML="<p>No Withdrawal Requests</p>"; return; }  
  snap.forEach((d)=>{  
    const w = d.data();  
    box.innerHTML += `  
      <hr>  
      <h3>${w.playerName || "Unknown"}</h3>  
      <p>UPI : ${w.upiId || ""}</p>  
      <p>Amount : ${w.amount || 0}</p>  
      <p>Status : ${w.status || ""}</p>  
      <button onclick="approveWithdraw('${d.id}')">Approve</button>  
      <button onclick="rejectWithdraw('${d.id}')">Reject</button>  
      <button onclick="deleteWithdraw('${d.id}')">Delete</button>  
    `;  
  });  
}  
  
window.approveRegistration = async function(id){ await updateDoc(doc(db,"registrations",id), { status:"approved" }); alert("Registration Approved"); loadRegistrations(); }  
window.rejectRegistration = async function(id){ await updateDoc(doc(db,"registrations",id), { status:"rejected" }); alert("Registration Rejected"); loadRegistrations(); }  
window.approveDeposit = async function(id){ await updateDoc(doc(db,"depositRequests",id), { status:"approved" }); alert("Deposit Approved"); loadDeposits(); }  
window.rejectDeposit = async function(id){ await updateDoc(doc(db,"depositRequests",id), { status:"rejected" }); alert("Deposit Rejected"); loadDeposits(); }  
window.approveWithdraw = async function(id){ await updateDoc(doc(db,"withdrawRequests",id), { status:"approved" }); alert("Withdrawal Approved"); loadWithdraws(); }  
window.rejectWithdraw = async function(id){ await updateDoc(doc(db,"withdrawRequests",id), { status:"rejected" }); alert("Withdrawal Rejected"); loadWithdraws(); }  
window.deleteRegistration = function(id){ if(!confirm("Delete this?")){ return; } deleteDoc(doc(db,"registrations",id)); alert("Deleted"); loadRegistrations(); }  
window.deleteDeposit = function(id){ if(!confirm("Delete this?")){ return; } deleteDoc(doc(db,"depositRequests",id)); alert("Deleted"); loadDeposits(); }  
window.deleteWithdraw = function(id){ if(!confirm("Delete this?")){ return; } deleteDoc(doc(db,"withdrawRequests",id)); alert("Deleted"); loadWithdraws(); }  
window.logout = function(){ signOut(auth).then(() => { localStorage.removeItem("admin"); location.href="admin-login.html"; }); }  
</script>  
</body>  
  </html>
