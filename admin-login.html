<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<center>

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Admin Email">

<br><br>

<input type="password" id="password" placeholder="Admin Password">

<br><br>

<button onclick="loginAdmin()">Login</button>

</center>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

// Step 4: Aapka actual Firebase config jo baki pages me chal raha hai
const firebaseConfig = {
apiKey: "AIzaSyDXB_JNlV4lK-St7dndGMLKaTP_yx67eKM",
authDomain: "ff-tournament-app-aa2e3.firebaseapp.com",
projectId: "ff-tournament-app-aa2e3",
storageBucket: "ff-tournament-app-aa2e3.firebasestorage.app",
messagingSenderId: "247807878735",
appId: "1:247807878735:web:f4fa407b563f3ed108ec3a"
};

// Step 5: Firebase initialize aur loginAdmin function setup
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginAdmin = async function(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

// Step 6: Sign in karne ka secure logic aur error handling
try{

await signInWithEmailAndPassword(
auth,
email,
password
);

location.href="admin.html";

}
catch(error){

alert(error.message);

}

}

// Step 7: Script close ho gaya
</script>

</body>
</html>
