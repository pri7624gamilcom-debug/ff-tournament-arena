<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Wheel</title>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.95)),
                        radial-gradient(circle at center,#ff330022 0%,#000 70%);
            background-color: #080000;
            color: white;
            text-align: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 10px;
            margin: 0;
        }

        .back-home-btn {
            background: rgba(255, 51, 0, 0.2);
            color: #ff3300;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #ff3300;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .roller-container { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }

        .reel {
            width: 80px; height: 80px;
            background: rgba(20,0,0,.9);
            border: 2px solid #ff3300;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px;
            box-shadow: 0 0 15px rgba(255,50,0,.5);
        }

        .bet-select-panel { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

        .btn-bet {
            padding: 10px 15px; font-weight: bold; border-radius: 8px;
            border: 1px solid #ff3300; background: #220000; color: white; cursor: pointer;
        }

        .btn-bet.active { background: #ff3300; border-color: #ffcc00; }

        .btn-spin {
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            background: linear-gradient(45deg,#ff6600,#ff2200);
            border: none; color: white; border-radius: 30px; cursor: pointer;
            box-shadow: 0 0 15px rgba(255,50,0,.5);
        }

        .win-table { margin: 20px auto; width: 100%; max-width: 450px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .win-row { background: rgba(20,0,0,.9); padding: 8px; border-radius: 8px; display: flex; justify-content: space-between; border: 1px solid #ff3300; }
        #msg { font-size: 20px; color: #ffcc00; margin: 20px 0; font-weight: bold; text-shadow: 0 0 10px #ff3300; }
    </style>
</head>
<body>

<button class="back-home-btn" onclick="window.location.href='4rabet.html'">⬅ Back To Casino</button>

<h2>🎰 Roulette Wheel 🎰</h2>
<div style="font-size: 20px; margin-bottom: 10px;">Balance: <span id="coins">0</span></div>

<div class="roller-container">
    <div class="reel" id="reel1">🍒</div>
    <div class="reel" id="reel2">🍒</div>
    <div class="reel" id="reel3">🍒</div>
</div>

<div class="bet-select-panel">
    <button class="btn-bet active" onclick="selectBet(10,this)">10</button>
    <button class="btn-bet" onclick="selectBet(20,this)">20</button>
    <button class="btn-bet" onclick="selectBet(50,this)">50</button>
    <button class="btn-bet" onclick="selectBet(100,this)">100</button>
</div>

<div class="action-container">
    <button class="btn-spin" id="spinBtn" onclick="spin()">SPIN 10</button>
</div>

<div id="msg">Select Bet & Spin!</div>

<div class="win-table">
    <div class="win-row"><span>🍒 (1x)</span><span id="r0">10</span></div>
    <div class="win-row"><span>🍋 (2x)</span><span id="r1">20</span></div>
    <div class="win-row"><span>💎 (5x)</span><span id="r2">50</span></div>
    <div class="win-row"><span>7️⃣ (10x)</span><span id="r3">100</span></div>
    <div class="win-row"><span>⭐ (15x)</span><span id="r4">150</span></div>
    <div class="win-row"><span>🔔 (20x)</span><span id="r5">200</span></div>
    <div class="win-row"><span>🔥 (25x)</span><span id="r6">250</span></div>
    <div class="win-row"><span>🍀 (50x)</span><span id="r7">500</span></div>
    <div class="win-row"><span>🍉 (100x)</span><span id="r8">1000</span></div>
    <div class="win-row"><span>🍇 (200x)</span><span id="r9">2000</span></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDXB_JNlV4lK-St7dndGMLKaTP_yx67eKM",
      authDomain: "ff-tournament-app-aa2e3.firebaseapp.com",
      projectId: "ff-tournament-app-aa2e3",
      storageBucket: "ff-tournament-app-aa2e3.firebasestorage.app",
      messagingSenderId: "247807878735",
      appId: "1:247807878735:web:f4fa407b563f3ed108ec3a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let currentBet = 10;

    onAuthStateChanged(auth, async (user) => {
        if (!user) { location.href = "login.html"; return; }
        currentUser = user;
        const userRef = doc(db, "users", user.uid);
        
        onSnapshot(userRef, (snap) => {
            console.log("Firestore Data:", snap.data());
            if (snap.exists()) { 
                document.getElementById("coins").innerText = snap.data().coins || 0; 
            }
        });
    });

    window.selectBet = function(val, btnElement){
        currentBet = val;
        document.querySelectorAll('.btn-bet').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        document.getElementById('spinBtn').innerText = "SPIN " + val;
    }

    const symbols = ['🍒','🍋','💎','7️⃣','⭐','🔔','🔥','🍀','🍉','🍇'];
    function getRandomSymbol(){ return symbols[Math.floor(Math.random() * symbols.length)]; }

    window.spin = async function(){
        if (!currentUser) return;
        const userRef = doc(db, "users", currentUser.uid);
        const userSnap = await getDoc(userRef);
        
        console.log("Current Coins:", userSnap.data().coins);

        if((userSnap.data().coins || 0) < currentBet) { 
            alert("Insufficient coins!"); 
            return; 
        }

        try{
            await updateDoc(userRef,{
                coins: increment(-currentBet)
            });
            console.log("Coins deducted:", currentBet);
        } catch(err){
            console.error(err);
            alert(err.message);
        }
        
        const spinBtn = document.getElementById('spinBtn');
        spinBtn.disabled = true;
        document.getElementById('msg').innerText = "Spinning...";
        
        let counter = 0;
        const timer = setInterval(()=>{
            document.getElementById('reel1').innerText = getRandomSymbol();
            document.getElementById('reel2').innerText = getRandomSymbol();
            document.getElementById('reel3').innerText = getRandomSymbol();
            counter++;
            
            if(counter > 20) {
                clearInterval(timer);
                spinBtn.disabled = false;
                document.getElementById('msg').innerText = "Spin complete!";
            }
        }, 100);
    }
</script>
</body>
</html>
