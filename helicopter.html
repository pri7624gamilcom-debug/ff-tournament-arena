<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helicopter Galaxy Crash</title>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.95)),
                        radial-gradient(circle at center,#ff330022 0%,#000 70%);
            background-color: #080000;
            color: white;
            text-align: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 10px;
        }

        .back-home-btn {
            background: rgba(255, 51, 0, 0.2);
            color: #ff3300;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #ff3300;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .game-card {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 300px;
            margin: 20px auto;
            border: 2px solid #ff3300;
            border-radius: 20px;
            background: #000;
            box-shadow: 0 0 20px rgba(255, 50, 0, 0.4);
            overflow: hidden;
        }

        #rocket { font-size: 30px; position: absolute; left: 10px; bottom: 100px; z-index: 10; display: none; }
        #multiplier { font-size: 50px; font-weight: 900; color: #ffcc00; margin-top: 80px; text-shadow: 0 0 20px #ffaa00; }
        .bet-panel { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-ctrl { padding: 10px 20px; font-size: 20px; cursor: pointer; background: #220000; color: #ff3300; border: 1px solid #ff3300; border-radius: 10px; font-weight: bold; }
        .btn-bet { padding: 15px 40px; font-size: 18px; font-weight: bold; cursor: pointer; background: linear-gradient(45deg,#ff6600,#ff2200); color: white; border: none; border-radius: 30px; box-shadow: 0 0 15px rgba(255,50,0,.5); }
        .btn-cashout { background: #330000 !important; border: 2px solid #ffcc00; color: #ffcc00; }
    </style>
</head>
<body>

    <button class="back-home-btn" onclick="window.location.href='4rabet.html'">⬅ Back To Casino</button>

    <div class="game-card" id="game-card">
        <div id="multiplier">0.00x</div>
        <div id="rocket">🚀</div>
    </div>

    <div class="bet-panel">
        <button class="btn-ctrl" onclick="updateBet(-5)">-</button>
        <button class="btn-bet" id="bet-btn" onclick="toggleGame()">BET 10</button>
        <button class="btn-ctrl" onclick="updateBet(5)">+</button>
    </div>

    <script>
        let mult = 0.00;
        let currentBet = 10;
        let isPlaying = false;
        let timer;
        let lossStreak = 0; 

        const rocket = document.getElementById('rocket');
        const multDisp = document.getElementById('multiplier');
        const betBtn = document.getElementById('bet-btn');

        function updateBet(val){
            if(!isPlaying){
                currentBet = Math.max(10, currentBet + val);
                betBtn.innerText = "BET " + currentBet;
            }
        }

        function toggleGame(){
            if(!isPlaying){
                isPlaying = true;
                rocket.style.display = "block";
                betBtn.innerText = "CASHOUT";
                betBtn.classList.add('btn-cashout');
                startRocket();
            } else {
                cashOut();
            }
        }

        function startRocket(){
            let time = 0;
            // Logic: Loss streak divided by 2 (Minimum 0.5 rakha hai)
            let maxCrash = Math.max(0.5, lossStreak / 2);

            mult = 0.00;
            timer = setInterval(() => {
                mult += 0.05;
                time += 0.2;
                multDisp.innerText = mult.toFixed(2) + "x";
                rocket.style.left = (mult * 20) + "px";
                rocket.style.bottom = (100 + Math.sin(time) * 50) + "px";
                
                if(mult >= maxCrash){
                    clearInterval(timer);
                    rocket.innerText = "💥";
                    lossStreak++; // Streak background mein badhti rahegi
                    setTimeout(() => { alert("CRASHED!"); reset(); }, 500);
                }
            }, 100);
        }

        function cashOut(){
            clearInterval(timer);
            alert("WON: " + (currentBet * mult).toFixed(2));
            lossStreak = 0; // Jeet gaye toh streak reset
            reset();
        }

        function reset(){
            isPlaying = false;
            mult = 0.00;
            rocket.style.display = "none";
            rocket.innerText = "🚀";
            betBtn.innerText = "BET " + currentBet;
            betBtn.classList.remove('btn-cashout');
            multDisp.innerText = "0.00x";
        }
    </script>
</body>
</html>
